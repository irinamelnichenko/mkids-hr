<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>m.kids — Бюджет (OPEX)</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#27ae60;--green2:#2ecc71;--blue:#2980b9;--blue2:#3498db;
  --red:#c0392b;--red2:#e74c3c;--orange:#e67e22;--yellow:#f1c40f;
  --dark:#1a2332;--dark2:#2c3e50;--gray:#7f8c8d;--gray2:#bdc3c7;
  --bg:#f0f4f8;--white:#fff;
  --r:10px;--sh:0 2px 12px rgba(0,0,0,.08)
}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--dark2);font-size:14px;line-height:1.5;min-height:100vh}
button{font-family:inherit;cursor:pointer}
select{font-family:inherit}
.hidden{display:none!important}

.wrap{max-width:1200px;margin:0 auto;padding:24px 20px 60px}

/* ── HEADER ────────────────────────────────── */
.hd{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:22px}
.hd h1{font-size:24px;font-weight:900;color:var(--dark);flex:1;min-width:260px}
.hd-meta{font-size:12px;color:var(--gray);margin-top:3px;font-weight:500}
.hd-ctrl{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.month-sel{padding:9px 14px;border:1.5px solid var(--gray2);border-radius:8px;background:#fff;
  font-size:14px;font-weight:600;color:var(--dark2);outline:none;cursor:pointer}
.month-sel:focus{border-color:var(--green)}
.btn{padding:10px 16px;border:none;border-radius:var(--r);font-size:14px;font-weight:600;
  display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.btn-primary{background:var(--green);color:#fff}
.btn-primary:hover{background:var(--green2)}
.btn-primary:disabled{opacity:.55;cursor:wait}

/* ── BANNER ────────────────────────────────── */
.banner{background:#fdf2f2;border:1px solid #fca5a5;color:var(--red);
  padding:14px 18px;border-radius:var(--r);margin-bottom:18px;
  display:flex;align-items:center;gap:10px;font-weight:600;font-size:14px}
.banner-ic{font-size:20px}

/* ── KPI ──────────────────────────────────── */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-bottom:22px}
.kpi{background:#fff;border-radius:var(--r);padding:18px 20px;box-shadow:var(--sh);
  border:2px solid transparent;transition:border-color .2s}
.kpi-lbl{font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.5px}
.kpi-val{font-size:26px;font-weight:900;color:var(--dark);margin-top:6px;line-height:1.1}
.kpi-sub{font-size:12px;color:var(--gray);margin-top:4px;font-weight:500}
.kpi.ok{border-color:var(--green)}
.kpi.over{border-color:var(--red2)}
.kpi.over .kpi-val{color:var(--red)}

/* ── CARD ─────────────────────────────────── */
.card{background:#fff;border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:22px}
.card-hd{padding:14px 18px;border-bottom:1px solid #e8ecf0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.card-hd h3{font-size:14px;font-weight:800;color:var(--dark)}
.card-bd{padding:8px 0}
.card-bd.pad{padding:18px}

/* ── TABLE ────────────────────────────────── */
.tbl{width:100%;border-collapse:collapse}
.tbl thead th{padding:10px 14px;text-align:left;font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:.5px;color:var(--gray);
  background:#f8fafc;border-bottom:2px solid #e8ecf0}
.tbl thead th.num{text-align:right}
.tbl tbody td{padding:11px 14px;border-bottom:1px solid #f0f4f8;font-size:14px}
.tbl tbody td.num{text-align:right;font-variant-numeric:tabular-nums}
.tbl tbody tr:hover{background:#fafbfc}
.tbl tbody tr.row-over{background:#fef5f5}
.tbl tbody tr.row-over:hover{background:#fdebeb}
.tbl tbody tr.total{font-weight:800;background:#f4f7fa;border-top:2px solid #e2e8f0}
.tbl tbody tr.total td{font-size:15px;color:var(--dark)}
.cat-name{font-weight:600;color:var(--dark2)}
.diff-pos{color:var(--green)}
.diff-neg{color:var(--red)}
.diff-zero{color:var(--gray)}
.muted{color:var(--gray2)}

.badge{display:inline-block;padding:3px 9px;border-radius:12px;
  font-size:12px;font-weight:700;min-width:54px;text-align:center}
.b-ok{background:#e8f8f0;color:var(--green)}
.b-warn{background:#fef5e0;color:#b7791f}
.b-bad{background:#fdebeb;color:var(--red)}
.b-none{background:#f0f4f8;color:var(--gray2)}

/* ── CHART ────────────────────────────────── */
.chart-wrap{position:relative;height:340px;padding:6px}

/* ── STATES ───────────────────────────────── */
.loading{display:flex;align-items:center;justify-content:center;padding:60px;
  flex-direction:column;gap:14px;color:var(--gray)}
.spinner{width:34px;height:34px;border:3px solid #e8ecf0;border-top-color:var(--green);
  border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.err{background:#fdf2f2;border:1px solid #fca5a5;color:var(--red);
  padding:14px 18px;border-radius:var(--r);margin-bottom:18px;font-weight:600}

/* ── RESPONSIVE ───────────────────────────── */
@media (max-width:640px){
  .wrap{padding:16px 12px 40px}
  .hd h1{font-size:20px}
  .kpi-val{font-size:22px}
  .tbl thead th,.tbl tbody td{padding:9px 10px;font-size:13px}
  .chart-wrap{height:280px}
}
</style>
</head>
<body>

<div class="wrap">
  <div class="hd">
    <div style="flex:1;min-width:260px">
      <h1 id="title">💰 Бюджет — Осокорки</h1>
      <div class="hd-meta" id="meta">завантаження…</div>
    </div>
    <div class="hd-ctrl">
      <select id="monthSel" class="month-sel"></select>
      <button id="refreshBtn" class="btn btn-primary">🔄 Оновити</button>
    </div>
  </div>

  <div id="errBox" class="err hidden"></div>

  <div id="content" class="hidden">
    <div id="banner" class="banner hidden">
      <span class="banner-ic">⚠️</span>
      <span id="bannerTxt"></span>
    </div>

    <div class="kpis">
      <div id="kpiBudget" class="kpi">
        <div class="kpi-lbl">Бюджет на місяць</div>
        <div class="kpi-val" id="kpiBudgetVal">—</div>
        <div class="kpi-sub" id="kpiBudgetSub">&nbsp;</div>
      </div>
      <div id="kpiSpent" class="kpi">
        <div class="kpi-lbl">Витрачено</div>
        <div class="kpi-val" id="kpiSpentVal">—</div>
        <div class="kpi-sub" id="kpiSpentSub">&nbsp;</div>
      </div>
      <div id="kpiLeft" class="kpi">
        <div class="kpi-lbl">Залишок</div>
        <div class="kpi-val" id="kpiLeftVal">—</div>
        <div class="kpi-sub" id="kpiLeftSub">&nbsp;</div>
      </div>
    </div>

    <div class="card">
      <div class="card-hd">
        <h3>📋 Витрати по категоріях <span id="tblMonth" style="font-weight:500;color:var(--gray)"></span></h3>
      </div>
      <div class="card-bd">
        <table class="tbl">
          <thead>
            <tr>
              <th>Категорія</th>
              <th class="num">Факт</th>
              <th class="num">Бюджет</th>
              <th class="num">Різниця</th>
              <th class="num">%</th>
            </tr>
          </thead>
          <tbody id="tblBody"></tbody>
        </table>
      </div>
    </div>

    <div class="card">
      <div class="card-hd">
        <h3>📊 Динаміка по місяцях</h3>
      </div>
      <div class="card-bd pad">
        <div class="chart-wrap"><canvas id="chart"></canvas></div>
      </div>
    </div>
  </div>

  <div id="loadBox" class="loading">
    <div class="spinner"></div>
    <div>Завантаження даних…</div>
  </div>
</div>

<script>
'use strict';

var CFG = {
  SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbyTSUVlaN4-PpXe47zCSmhVs0Qxy1FDXG_XsB4zcKNpqBxdhDtS9ibM4YFGkGjmPQDFWQ/exec',
  LOC: 'Осокорки',
  YEAR: new Date().getFullYear(),
  MONTHS_DISP: ['Січень','Лютий','Березень','Квітень','Травень','Червень','Липень','Серпень','Вересень','Жовтень','Листопад','Грудень'],
  MONTHS_SHORT:['Січ','Лют','Бер','Квіт','Тра','Чер','Лип','Сер','Вер','Жов','Лис','Гру'],
  CACHE_KEY:  'opex_cache_v1',
  CACHE_TTL:  5 * 60 * 1000
};

var S = {
  data: null,
  month: new Date().getMonth() + 1,
  chart: null
};

// ── HELPERS ─────────────────────────────────
function $(id){return document.getElementById(id);}
function fmtUah(n){
  if (n === null || n === undefined || isNaN(n)) return '0';
  var sign = n < 0 ? '-' : '';
  var v = Math.round(Math.abs(n));
  return sign + v.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
}
function pct(fact, budget){
  if (!budget || budget <= 0) return null;
  return (fact / budget) * 100;
}
function nowStr(){
  var d = new Date();
  var pad = function(x){return x<10?'0'+x:String(x);};
  return pad(d.getDate())+'.'+pad(d.getMonth()+1)+'.'+d.getFullYear()+
         ' '+pad(d.getHours())+':'+pad(d.getMinutes());
}

// ── FETCH ───────────────────────────────────
function loadCache(){
  try {
    var raw = localStorage.getItem(CFG.CACHE_KEY);
    if (!raw) return null;
    var obj = JSON.parse(raw);
    if (!obj || !obj.ts || !obj.data) return null;
    if (obj.loc !== CFG.LOC || obj.year !== CFG.YEAR) return null;
    if (Date.now() - obj.ts > CFG.CACHE_TTL) return null;
    return obj;
  } catch(e){ return null; }
}
function saveCache(data){
  try {
    localStorage.setItem(CFG.CACHE_KEY, JSON.stringify({
      ts: Date.now(), loc: CFG.LOC, year: CFG.YEAR, data: data
    }));
  } catch(e){}
}

async function fetchData(force){
  if (!force) {
    var c = loadCache();
    if (c) {
      $('meta').textContent = 'оновлено ' + new Date(c.ts).toLocaleString('uk-UA') + ' (з кешу)';
      return c.data;
    }
  }
  var url = CFG.SCRIPT_URL + '?action=getOpexData&loc=' + encodeURIComponent(CFG.LOC) +
            '&year=' + encodeURIComponent(CFG.YEAR);
  var r = await fetch(url, {redirect:'follow'});
  if (!r.ok) throw new Error('HTTP ' + r.status);
  var json = await r.json();
  if (!json.ok) throw new Error(json.error || 'Unknown error');
  saveCache(json);
  $('meta').textContent = 'оновлено ' + nowStr();
  return json;
}

// ── RENDER ──────────────────────────────────
function renderMonthSel(){
  var sel = $('monthSel');
  sel.innerHTML = '';
  for (var i = 1; i <= 12; i++){
    var o = document.createElement('option');
    o.value = i;
    o.textContent = CFG.MONTHS_DISP[i-1];
    if (i === S.month) o.selected = true;
    sel.appendChild(o);
  }
}

function getMonthValues(cat, m){
  var mo = (cat.months || []).find(function(x){return x.month === m;});
  return {
    fact:   mo ? (mo.fact   || 0) : 0,
    budget: mo ? (mo.budget || 0) : 0
  };
}

function rowsForMonth(cats, m){
  return cats.map(function(c){
    var v = getMonthValues(c, m);
    var p = pct(v.fact, v.budget);
    return {
      name: c.name,
      fact: v.fact,
      budget: v.budget,
      diff: v.budget - v.fact,
      pct: p,
      over: p !== null && p > 100
    };
  });
}

function renderBanner(rows){
  var overs = rows.filter(function(r){return r.over;});
  var b = $('banner');
  if (!overs.length){ b.classList.add('hidden'); return; }
  var txt;
  if (overs.length === 1){
    var o = overs[0];
    txt = 'Перевищення бюджету: ' + o.name + ' — +' + fmtUah(o.fact - o.budget) +
          ' грн (заплановано ' + fmtUah(o.budget) + ', фактично ' + fmtUah(o.fact) + ')';
  } else {
    var head = overs.slice(0, 2).map(function(o){return o.name;}).join(', ');
    var rest = overs.length - 2;
    txt = 'Перевищення бюджету: ' + head + (rest > 0 ? ', ще +' + rest : '');
  }
  $('bannerTxt').textContent = txt;
  b.classList.remove('hidden');
}

function renderKpis(rows){
  var totalBudget = 0, totalFact = 0;
  rows.forEach(function(r){ totalBudget += r.budget; totalFact += r.fact; });
  var left = totalBudget - totalFact;
  var spentPct = totalBudget > 0 ? (totalFact / totalBudget) * 100 : null;

  $('kpiBudgetVal').textContent = fmtUah(totalBudget) + ' ₴';
  $('kpiBudgetSub').textContent = rows.length + ' категорій';

  $('kpiSpentVal').textContent = fmtUah(totalFact) + ' ₴';
  $('kpiSpentSub').textContent = spentPct !== null ? spentPct.toFixed(1) + '% бюджету' : ' ';

  var kpiLeft = $('kpiLeft');
  kpiLeft.classList.remove('ok','over');
  $('kpiLeftVal').textContent = (left < 0 ? '-' : '') + fmtUah(Math.abs(left)) + ' ₴';
  if (totalBudget > 0){
    if (left < 0){
      kpiLeft.classList.add('over');
      $('kpiLeftSub').textContent = 'перевищення';
    } else {
      kpiLeft.classList.add('ok');
      $('kpiLeftSub').textContent = 'у межах';
    }
  } else {
    $('kpiLeftSub').textContent = ' ';
  }
}

function renderTable(rows){
  $('tblMonth').textContent = '— ' + CFG.MONTHS_DISP[S.month - 1];
  var body = $('tblBody');
  body.innerHTML = '';

  rows.forEach(function(r){
    var tr = document.createElement('tr');
    if (r.over) tr.className = 'row-over';

    var cls, badge;
    if (r.pct === null){ cls = 'b-none'; badge = '—'; }
    else if (r.pct > 100){ cls = 'b-bad'; badge = r.pct.toFixed(0) + '%'; }
    else if (r.pct >= 95){ cls = 'b-warn'; badge = r.pct.toFixed(0) + '%'; }
    else { cls = 'b-ok'; badge = r.pct.toFixed(0) + '%'; }

    var diffCls, diffTxt;
    if (r.budget === 0){ diffCls = 'muted'; diffTxt = '—'; }
    else if (r.diff > 0){ diffCls = 'diff-pos'; diffTxt = '+' + fmtUah(r.diff); }
    else if (r.diff < 0){ diffCls = 'diff-neg'; diffTxt = fmtUah(r.diff); }
    else { diffCls = 'diff-zero'; diffTxt = '0'; }

    tr.innerHTML =
      '<td class="cat-name">' + escapeHtml(r.name) + '</td>' +
      '<td class="num">' + fmtUah(r.fact) + '</td>' +
      '<td class="num">' + (r.budget > 0 ? fmtUah(r.budget) : '<span class="muted">—</span>') + '</td>' +
      '<td class="num ' + diffCls + '">' + diffTxt + '</td>' +
      '<td class="num"><span class="badge ' + cls + '">' + badge + '</span></td>';
    body.appendChild(tr);
  });

  var tF = 0, tB = 0;
  rows.forEach(function(r){ tF += r.fact; tB += r.budget; });
  var tDiff = tB - tF;
  var tPct = tB > 0 ? (tF / tB) * 100 : null;
  var tCls, tBadge;
  if (tPct === null){ tCls = 'b-none'; tBadge = '—'; }
  else if (tPct > 100){ tCls = 'b-bad'; tBadge = tPct.toFixed(0) + '%'; }
  else if (tPct >= 95){ tCls = 'b-warn'; tBadge = tPct.toFixed(0) + '%'; }
  else { tCls = 'b-ok'; tBadge = tPct.toFixed(0) + '%'; }

  var totDiffCls = tDiff > 0 ? 'diff-pos' : (tDiff < 0 ? 'diff-neg' : 'diff-zero');
  var totDiffTxt = tDiff > 0 ? '+' + fmtUah(tDiff) : (tDiff < 0 ? fmtUah(tDiff) : '0');

  var totRow = document.createElement('tr');
  totRow.className = 'total';
  totRow.innerHTML =
    '<td>РАЗОМ</td>' +
    '<td class="num">' + fmtUah(tF) + '</td>' +
    '<td class="num">' + fmtUah(tB) + '</td>' +
    '<td class="num ' + totDiffCls + '">' + totDiffTxt + '</td>' +
    '<td class="num"><span class="badge ' + tCls + '">' + tBadge + '</span></td>';
  body.appendChild(totRow);
}

function renderChart(cats){
  var labels = CFG.MONTHS_SHORT.slice();
  var budget = [], fact = [], factColors = [];
  for (var m = 1; m <= 12; m++){
    var sumF = 0, sumB = 0;
    cats.forEach(function(c){
      var v = getMonthValues(c, m);
      sumF += v.fact; sumB += v.budget;
    });
    budget.push(sumB);
    fact.push(sumF);
    var over = sumB > 0 && sumF > sumB;
    var active = m === S.month;
    var color = over ? '#e74c3c' : '#27ae60';
    factColors.push(active ? color : color + 'BB');
  }

  var ctx = $('chart').getContext('2d');
  if (S.chart) S.chart.destroy();
  S.chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [
        { label: 'Бюджет', data: budget, backgroundColor: '#cbd5e0', borderRadius: 4 },
        { label: 'Факт',   data: fact,   backgroundColor: factColors, borderRadius: 4 }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { position: 'bottom', labels: { font: { size: 12 } } },
        tooltip: {
          callbacks: {
            label: function(c){ return c.dataset.label + ': ' + fmtUah(c.parsed.y) + ' ₴'; }
          }
        }
      },
      scales: {
        y: {
          beginAtZero: true,
          ticks: { callback: function(v){ return fmtUah(v); }, font: { size: 11 } },
          grid: { color: '#eef2f6' }
        },
        x: { grid: { display: false }, ticks: { font: { size: 11 } } }
      }
    }
  });
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, function(c){
    return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
  });
}

// ── ORCHESTRATION ───────────────────────────
function rerenderForMonth(){
  if (!S.data) return;
  var rows = rowsForMonth(S.data.categories, S.month);
  renderBanner(rows);
  renderKpis(rows);
  renderTable(rows);
  renderChart(S.data.categories);
}

async function load(force){
  $('errBox').classList.add('hidden');
  $('refreshBtn').disabled = true;
  if (!S.data){
    $('content').classList.add('hidden');
    $('loadBox').classList.remove('hidden');
  }
  try {
    var data = await fetchData(force);
    S.data = data;
    $('title').textContent = '💰 Бюджет — ' + (data.loc || CFG.LOC);
    $('loadBox').classList.add('hidden');
    $('content').classList.remove('hidden');
    rerenderForMonth();
  } catch(e){
    $('loadBox').classList.add('hidden');
    var box = $('errBox');
    box.textContent = '❌ Помилка: ' + (e.message || e);
    box.classList.remove('hidden');
  } finally {
    $('refreshBtn').disabled = false;
  }
}

// ── INIT ────────────────────────────────────
renderMonthSel();
$('monthSel').addEventListener('change', function(e){
  S.month = +e.target.value;
  rerenderForMonth();
});
$('refreshBtn').addEventListener('click', function(){
  localStorage.removeItem(CFG.CACHE_KEY);
  load(true);
});
load(false);
</script>
</body>
</html>
